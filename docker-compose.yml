version: "3.9" 
services:
  fritzBoxUnten:
    image: myfritzconnectorrr:latest
    environment:
      FRITZBOX_USER_NAME : ${FRITZBOX_1_USER_NAME}
      FRITZBOX_USER_PASSWORD : ${FRITZBOX_1_USER_PASSWORD}
      FRITZBOX_IP_ADDRESS     : ${FRITZBOX_1_IP_ADDRESS}
      FRITZBOX_IDENTIFIER    : ${FRITZBOX_1_IDENTIFIER}
      DATABASE_NAME          : ${DATABASE_NAME}
      DATABASE_USER          : ${DATABASE_USER}
      DATABASE_PASSWORD      : ${DATABASE_PASSWORD}
      DATABASE_HOST          : ${DATABASE_HOST}
      DATABASE_PORT          : ${DATABASE_PORT}
  fritzBoxOben:
    image: myfritzconnectorrr:latest
    environment:
      FRITZBOX_USER_NAME : ${FRITZBOX_2_USER_NAME}
      FRITZBOX_USER_PASSWORD : ${FRITZBOX_2_USER_PASSWORD}
      FRITZBOX_IP_ADDRESS     : ${FRITZBOX_2_IP_ADDRESS}
      FRITZBOX_IDENTIFIER    : ${FRITZBOX_2_IDENTIFIER}
      DATABASE_NAME          : ${DATABASE_NAME}
      DATABASE_USER          : ${DATABASE_USER}
      DATABASE_PASSWORD      : ${DATABASE_PASSWORD}
      DATABASE_HOST          : ${DATABASE_HOST}
      DATABASE_PORT          : ${DATABASE_PORT}


